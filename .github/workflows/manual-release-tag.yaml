name: Create Production Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0). Leave empty to auto-bump minor version.'
        required: false
        type: string
      commit:
        description: 'Commit SHA to tag. Leave empty to tag the current HEAD of the branch.'
        required: false
        type: string
      force_override:
        description: 'Force re-tag an existing version (moves the tag to the current HEAD). Use to re-release a version with a fixed Dockerfile.'
        required: false
        type: boolean
        default: false

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Get latest production tag
        id: latesttag
        run: |
          git fetch --tags
          # Get latest clean version tag (without 'v' prefix or commit SHA)
          LATEST_TAG=$(git tag --sort=-creatordate | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_ENV
          echo "Latest production tag: $LATEST_TAG"

      - name: Determine new version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Use provided version
            NEW_VERSION="${{ inputs.version }}"
            # Remove 'v' prefix if present
            NEW_VERSION="${NEW_VERSION#v}"
          else
            # Auto-bump minor version
            CURRENT="${{ env.latest_tag }}"
            MAJOR=$(echo $CURRENT | cut -d. -f1)
            MINOR=$(echo $CURRENT | cut -d. -f2)
            PATCH=$(echo $CURRENT | cut -d. -f3)
            MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.0"
          fi
          
          NEW_TAG="${NEW_VERSION}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_ENV
          echo "New production tag: $NEW_TAG"

      - name: Validate version format
        run: |
          if ! [[ "${{ env.new_tag }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format. Expected format: 1.2.3"
            exit 1
          fi

      - name: Check if tag already exists
        run: |
          if git rev-parse "${{ env.new_tag }}" >/dev/null 2>&1; then
            if [ "${{ inputs.force_override }}" = "true" ]; then
              echo "WARNING: Tag ${{ env.new_tag }} already exists. force_override=true — deleting and re-creating."
              git push origin --delete "${{ env.new_tag }}" || true
              git tag -d "${{ env.new_tag }}" || true
            else
              echo "Error: Tag ${{ env.new_tag }} already exists"
              exit 1
            fi
          fi

      - name: Create and push production tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          TARGET_COMMIT="${{ inputs.commit }}"
          if [ -z "$TARGET_COMMIT" ]; then
            TARGET_COMMIT="HEAD"
          fi
          git tag -a "${{ env.new_tag }}" "$TARGET_COMMIT" -m "Release ${{ env.new_tag }}"
          git push origin "${{ env.new_tag }}"
          echo "Created production release tag: ${{ env.new_tag }} at commit $TARGET_COMMIT"

      - name: Trigger build and publish
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          # Only pass force_override field if true — older versions of the workflow
          # don't define this input and GitHub rejects unknown fields.
          if [ "${{ inputs.force_override }}" = "true" ]; then
            gh workflow run build-publish-mcr.yaml \
              --repo ${{ github.repository }} \
              --ref ${{ github.ref_name }} \
              --field tag=${{ env.new_tag }} \
              --field force_override=true
          else
            gh workflow run build-publish-mcr.yaml \
              --repo ${{ github.repository }} \
              --ref ${{ github.ref_name }} \
              --field tag=${{ env.new_tag }}
          fi
          echo "Triggered build-publish-mcr.yaml for tag ${{ env.new_tag }} (force_override=${{ inputs.force_override || 'false' }})"
