name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job to build the Docker image
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Verify Go version
        run: go version 
      #- name: Install dependencies
      #  run: |
      #    sudo apt-get update
      #    sudo apt-get install -y make
      - name: Run tests
        run: make test

      - name: Lint
        run: make lint

      - name: Helm lint and template
        run: make helm-validate

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4        

      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.26.0

      - name: e2e
        run: make test-e2e

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: /tmp/e2e-logs/
          retention-days: 7

